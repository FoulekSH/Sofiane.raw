name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm ci

    - name: Build Next.js App
      run: npm run build
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL: "https://sofiane.raw.evasion-studio.fr"

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 51.210.242.146
        username: bilal
        password: ${{ secrets.VPS_PASSWORD }}
        script: |
          set -e
          echo "Starting deployment in ~/apps/Sofiane.raw"
          cd ~/apps/Sofiane.raw
          
          echo "Updating source code..."
          git fetch origin main
          git reset --hard origin/main
          
          echo "Installing dependencies..."
          npm install
          
          echo "Database operations..."
          npx prisma generate
          npx prisma db push
          
          echo "Seeding and Syncing..."
          npm run sync-photos
          npm run seed
          npm run set-featured
          
          echo "Building application..."
          npm run build
          
          echo "Restarting application..."
          if pm2 list | grep -q "sofiane-portfolio"; then
            pm2 restart sofiane-portfolio
          else
            pm2 start npm --name "sofiane-portfolio" -- run start
          fi
          
          echo "Deployment successful!"
